<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday</title>
  <style>
    :root{
      --bg1:#0f1020;
      --bg2:#1b1d3a;
      --card:#ffffff12;
      --text:#f5f7ff;
      --muted:#cbd3ff;
      --accent:#ffd166;
      --accent2:#ff7aa2;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family: "Segoe UI", system-ui, -apple-system, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 600px at 10% 10%, #2b2e68 0%, transparent 60%),
        radial-gradient(900px 500px at 90% 90%, #3a1f4d 0%, transparent 60%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display:flex;
      align-items:center;
      justify-content:center;
      overflow-x:hidden;
      padding:20px;
    }

    .wrap{
      width:min(980px, 96vw);
    }

    .card{
      background:var(--card);
      border:1px solid #ffffff22;
      backdrop-filter: blur(10px);
      border-radius:24px;
      padding:34px 22px;
      box-shadow:0 20px 60px #00000055;
      text-align:center;
    }

    .tag{
      display:inline-block;
      font-size:.82rem;
      color:#111;
      background:linear-gradient(90deg,var(--accent),#ffe29a);
      padding:6px 12px;
      border-radius:999px;
      font-weight:600;
      margin-bottom:14px;
    }

    h1{
      margin:8px 0 8px;
      font-size:clamp(2rem,5vw,3rem);
      line-height:1.15;
    }

    .name{
      background:linear-gradient(90deg,#fff,#ffd166,#ff9ec0);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    p{
      margin:10px auto;
      max-width:700px;
      color:var(--muted);
      font-size:1.03rem;
      line-height:1.7;
    }

    .divider{
      width:90px;
      height:3px;
      border-radius:99px;
      margin:18px auto;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
    }

    .gallery-title{
      margin-top:26px;
      margin-bottom:12px;
      font-weight:600;
      color:#eaf0ff;
      letter-spacing:.4px;
    }

    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(210px, 1fr));
      gap:12px;
      margin-top:12px;
    }

    .gallery img{
      width:100%;
      height:240px;
      object-fit:cover;
      border-radius:14px;
      border:1px solid #ffffff2b;
      box-shadow:0 8px 20px #00000033;
      transition:transform .25s ease, box-shadow .25s ease;
      background:#0b0d1a;
    }

    .gallery img:hover{
      transform:translateY(-4px);
      box-shadow:0 12px 26px #00000055;
    }

    .footer{
      margin-top:20px;
      font-size:.95rem;
      color:#dbe2ff;
      opacity:.95;
    }

    .note{
      margin-top:10px;
      font-size:.86rem;
      color:#b8c3ff;
      opacity:.85;
    }

    @media (max-width:520px){
      .card{padding:24px 14px}
      .gallery img{height:210px}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="tag">23 June • Birthday Wishes</div>
      <h1>Happy Birthday, <span class="name">Teju</span> 🎉</h1>
      <div class="divider"></div>

      <p>
        Wishing you a peaceful day and a beautiful year ahead.
        May you always stay happy, healthy, and successful.
      </p>
      <p>Keep smiling and take care. ✨</p>

      <div class="gallery-title">Memories</div>
      <div class="gallery">
        <img src="./photos/IMG-20220617-WA0073.jpg" alt="Memory 1" />
        <img src="./photos/IMG-20220618-WA0017.jpg" alt="Memory 2" />
        <img src="./photos/IMG_20221031_195803.jpg" alt="Memory 3" />
        <img src="./photos/Screenshot_2022-07-05-10-14-21-355_lockscreen.jpg" alt="Memory 4" />
        <img src="./photos/Screenshot_2022-11-05-17-02-22-846_com.whatsapp.jpg" alt="Memory 5" />
        <img src="./photos/Snapchat-1083269426.jpg" alt="Memory 6" />
        <img src="./photos/Snapchat-1353360104.jpg" alt="Memory 7" />
        <img src="./photos/Snapchat-218598286.jpg" alt="Memory 8" />
      </div>

      <div class="footer">— Best wishes, Jay</div>
      <div class="note">Sent with respect and good intentions.</div>
    </section>
  </main>
</body>
</html>
